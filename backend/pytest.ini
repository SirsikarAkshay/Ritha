[pytest]
DJANGO_SETTINGS_MODULE = ritha.settings
python_files = tests.py test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

[coverage:run]
source = .
omit =
    */migrations/*
    */tests/*
    conftest.py
    manage.py
    ritha/settings*.py
    ritha/wsgi.py

[coverage:report]
show_missing = True
skip_covered = False

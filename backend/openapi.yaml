openapi: 3.0.3
info:
  title: Ritha API
  version: 1.0.0
  description: AI-powered personal stylist — daily looks, trip planning, cultural
    intelligence.
paths:
  /api/agents/conflict-detector/:
    post:
      operationId: agents_conflict_detector_create
      description: Checks calendar events against weather. Pass `date` (YYYY-MM-DD)
        and optionally `lat`/`lon`.
      summary: Detect outfit/weather/schedule conflicts
      tags:
      - agents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConflictDetectorInputRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ConflictDetectorInputRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ConflictDetectorInputRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictDetectorResponse'
          description: ''
  /api/agents/cultural-advisor/:
    post:
      operationId: agents_cultural_advisor_create
      description: Returns etiquette rules and local event clothing notes. Pass `country`,
        optional `city` and `month`.
      summary: Get cultural clothing advice for a destination
      tags:
      - agents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CulturalAdvisorInputRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CulturalAdvisorInputRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CulturalAdvisorInputRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CulturalAdvisorResponse'
          description: ''
  /api/agents/daily-look/:
    post:
      operationId: agents_daily_look_create
      description: Analyses today's calendar events and weather then selects the best
        outfit from the user's wardrobe. Persists an OutfitRecommendation record.
      summary: Generate today's daily outfit
      tags:
      - agents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DailyLookInputRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DailyLookInputRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DailyLookInputRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyLookResponse'
          description: ''
  /api/agents/outfit-planner/:
    post:
      operationId: agents_outfit_planner_create
      description: Returns a per-day outfit plan. Pass `trip_id` or `start_date`/`end_date`/`destination`.
      summary: Plan outfits for every day of a trip
      tags:
      - agents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OutfitPlannerInputRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OutfitPlannerInputRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OutfitPlannerInputRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutfitPlannerResponse'
          description: ''
  /api/agents/packing-list/:
    post:
      operationId: agents_packing_list_create
      description: Uses the 5-4-3-2-1 capsule rule. Pass `days` (int) and `activities`
        (list).
      summary: Generate a packing list for a trip
      tags:
      - agents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PackingListInputRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PackingListInputRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PackingListInputRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackingListResponse'
          description: ''
  /api/auth/forgot-password/:
    post:
      operationId: auth_forgot_password_create
      description: Sends a password-reset link to the given email address. Always
        returns 200 regardless of whether the email is registered (prevents user enumeration).
      summary: Request a password reset email
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RithaTokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RithaTokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RithaTokenObtainPairRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/auth/logout/:
    post:
      operationId: auth_logout_create
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/me/:
    get:
      operationId: auth_me_retrieve
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    put:
      operationId: auth_me_update
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: auth_me_partial_update
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/me/delete/:
    delete:
      operationId: auth_me_delete_destroy
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/auth/me/password/:
    post:
      operationId: auth_me_password_create
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/push-token/:
    post:
      operationId: auth_push_token_create
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/auth/register/:
    post:
      operationId: auth_register_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
          description: ''
  /api/auth/resend-verification/:
    post:
      operationId: auth_resend_verification_create
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/reset-password/:
    post:
      operationId: auth_reset_password_create
      description: Validates the reset token and sets a new password.
      summary: Reset password using a token from email
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/verify-email/:
    post:
      operationId: auth_verify_email_create
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/calendar/apple/connect/:
    post:
      operationId: calendar_apple_connect_create
      description: Validates the provided Apple ID and App-Specific Password by connecting
        to Apple's CalDAV server. Users must generate an App-Specific Password at
        appleid.apple.com — their regular Apple ID password will NOT work.
      summary: Connect Apple Calendar (CalDAV)
      tags:
      - calendar
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/calendar/apple/disconnect/:
    post:
      operationId: calendar_apple_disconnect_create
      description: Removes stored Apple credentials from Ritha.
      summary: Disconnect Apple Calendar
      tags:
      - calendar
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/calendar/apple/sync/:
    post:
      operationId: calendar_apple_sync_create
      description: Pulls events via CalDAV from the last 7 days and next 60 days.
      summary: Sync Apple Calendar events
      tags:
      - calendar
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppleSyncResult'
          description: ''
  /api/calendar/google/callback/:
    get:
      operationId: calendar_google_callback_retrieve
      description: |-
        GET /api/calendar/google/callback/?code=...&state=...
        Handles the OAuth redirect from Google.
        In production this redirects the browser to the frontend.
      tags:
      - calendar
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/calendar/google/connect/:
    get:
      operationId: calendar_google_connect_retrieve
      description: Returns a URL the user should open in their browser to grant Ritha
        read-only access to their Google Calendar. Requires GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET
        to be set.
      summary: Start Google Calendar OAuth flow
      tags:
      - calendar
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/calendar/google/disconnect/:
    post:
      operationId: calendar_google_disconnect_create
      description: Revokes OAuth tokens and removes the connection.
      summary: Disconnect Google Calendar
      tags:
      - calendar
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/calendar/google/sync/:
    post:
      operationId: calendar_google_sync_create
      description: Pulls events from the last 7 days and next 60 days into Ritha.
      summary: Sync Google Calendar events
      tags:
      - calendar
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoogleSyncResult'
          description: ''
  /api/calendar/google/webhook/:
    post:
      operationId: calendar_google_webhook_create
      description: Receives change notifications from Google and triggers a calendar
        sync.
      summary: Google Calendar push notification webhook
      tags:
      - calendar
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/calendar/outlook/callback/:
    get:
      operationId: calendar_outlook_callback_retrieve
      description: GET /api/calendar/outlook/callback/?code=...&state=...
      tags:
      - calendar
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/calendar/outlook/connect/:
    get:
      operationId: calendar_outlook_connect_retrieve
      description: Returns a URL for Microsoft OAuth consent. Requires MICROSOFT_CLIENT_ID
        and MICROSOFT_CLIENT_SECRET in .env.
      summary: Start Outlook Calendar OAuth flow
      tags:
      - calendar
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/calendar/outlook/disconnect/:
    post:
      operationId: calendar_outlook_disconnect_create
      description: POST /api/calendar/outlook/disconnect/
      summary: Disconnect Outlook Calendar
      tags:
      - calendar
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/calendar/outlook/sync/:
    post:
      operationId: calendar_outlook_sync_create
      description: Pulls events via Microsoft Graph API for the last 7 days and next
        60 days.
      summary: Sync Outlook Calendar events
      tags:
      - calendar
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutlookSyncResult'
          description: ''
  /api/calendar/status/:
    get:
      operationId: calendar_status_retrieve
      description: Returns connection status for Google and Apple calendars.
      summary: Calendar connection status
      tags:
      - calendar
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/cultural/events/:
    get:
      operationId: cultural_events_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - cultural
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLocalEventList'
          description: ''
  /api/cultural/events/{id}/:
    get:
      operationId: cultural_events_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this local event.
        required: true
      tags:
      - cultural
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocalEvent'
          description: ''
  /api/cultural/rules/:
    get:
      operationId: cultural_rules_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - cultural
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCulturalRuleList'
          description: ''
  /api/cultural/rules/{id}/:
    get:
      operationId: cultural_rules_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this cultural rule.
        required: true
      tags:
      - cultural
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CulturalRule'
          description: ''
  /api/health/:
    get:
      operationId: health_retrieve
      description: Returns service status, DB connectivity, and version. No auth required.
      summary: Health check
      tags:
      - health
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/itinerary/checklist/:
    get:
      operationId: itinerary_checklist_list
      description: |-
        CRUD for trip packing checklist items.
        Filter by trip: GET /api/itinerary/checklist/?trip_id=<id>
        Mark packed: PATCH /api/itinerary/checklist/<id>/ {"is_packed": true}
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - itinerary
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPackingChecklistItemList'
          description: ''
    post:
      operationId: itinerary_checklist_create
      description: |-
        CRUD for trip packing checklist items.
        Filter by trip: GET /api/itinerary/checklist/?trip_id=<id>
        Mark packed: PATCH /api/itinerary/checklist/<id>/ {"is_packed": true}
      tags:
      - itinerary
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PackingChecklistItemRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PackingChecklistItemRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PackingChecklistItemRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackingChecklistItem'
          description: ''
  /api/itinerary/checklist/{id}/:
    get:
      operationId: itinerary_checklist_retrieve
      description: |-
        CRUD for trip packing checklist items.
        Filter by trip: GET /api/itinerary/checklist/?trip_id=<id>
        Mark packed: PATCH /api/itinerary/checklist/<id>/ {"is_packed": true}
      parameters:
      - in: path
        name: id
        schema:
          type: string
          pattern: ^[0-9]+$
        required: true
      tags:
      - itinerary
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackingChecklistItem'
          description: ''
    put:
      operationId: itinerary_checklist_update
      description: |-
        CRUD for trip packing checklist items.
        Filter by trip: GET /api/itinerary/checklist/?trip_id=<id>
        Mark packed: PATCH /api/itinerary/checklist/<id>/ {"is_packed": true}
      parameters:
      - in: path
        name: id
        schema:
          type: string
          pattern: ^[0-9]+$
        required: true
      tags:
      - itinerary
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PackingChecklistItemRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PackingChecklistItemRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PackingChecklistItemRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackingChecklistItem'
          description: ''
    patch:
      operationId: itinerary_checklist_partial_update
      description: |-
        CRUD for trip packing checklist items.
        Filter by trip: GET /api/itinerary/checklist/?trip_id=<id>
        Mark packed: PATCH /api/itinerary/checklist/<id>/ {"is_packed": true}
      parameters:
      - in: path
        name: id
        schema:
          type: string
          pattern: ^[0-9]+$
        required: true
      tags:
      - itinerary
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPackingChecklistItemRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPackingChecklistItemRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPackingChecklistItemRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackingChecklistItem'
          description: ''
    delete:
      operationId: itinerary_checklist_destroy
      description: |-
        CRUD for trip packing checklist items.
        Filter by trip: GET /api/itinerary/checklist/?trip_id=<id>
        Mark packed: PATCH /api/itinerary/checklist/<id>/ {"is_packed": true}
      parameters:
      - in: path
        name: id
        schema:
          type: string
          pattern: ^[0-9]+$
        required: true
      tags:
      - itinerary
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/itinerary/checklist/from-packing-list/:
    post:
      operationId: itinerary_checklist_from_packing_list_create
      description: |-
        Auto-populate checklist from an agent packing list result.
        Body: {"trip_id": 1, "item_ids": [1, 2, 3]}
      tags:
      - itinerary
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PackingChecklistItemRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PackingChecklistItemRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PackingChecklistItemRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackingChecklistItem'
          description: ''
  /api/itinerary/events/:
    get:
      operationId: itinerary_events_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - itinerary
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCalendarEventList'
          description: ''
    post:
      operationId: itinerary_events_create
      tags:
      - itinerary
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalendarEventRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CalendarEventRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CalendarEventRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarEvent'
          description: ''
  /api/itinerary/events/{id}/:
    get:
      operationId: itinerary_events_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
          pattern: ^[0-9]+$
        required: true
      tags:
      - itinerary
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarEvent'
          description: ''
    put:
      operationId: itinerary_events_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          pattern: ^[0-9]+$
        required: true
      tags:
      - itinerary
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalendarEventRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CalendarEventRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CalendarEventRequest'
        required: true
      security:

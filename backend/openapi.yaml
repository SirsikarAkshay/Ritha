  /api/wardrobe/starter-pack/apply/:
    post:
      operationId: wardrobe_starter_pack_apply_create
      description: |-
        Bulk-creates ClothingItem rows for every accepted StarterPackItem, plus any custom items the user typed in. Records the decision in StarterPackApplication for offline analysis (which items get rejected most often → demote them in the next pack version).

        Idempotent: if the user has already applied a starter pack, this returns 409 — call DELETE first if the user wants to redo onboarding.
      summary: Apply the starter pack to the user's wardrobe
      tags:
      - wardrobe
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StarterPackApplyRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StarterPackApplyRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StarterPackApplyRequestRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StarterPackApplyResponse'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlreadyApplied'
          description: ''
  /api/wardrobe/starter-pack/preview/:
    get:
      operationId: wardrobe_starter_pack_preview_retrieve
      description: |-
        Returns the proposed wardrobe items for the user's demographic. Each item carries its prevalence percentage and survey citation so the client can render a tooltip explaining 'why is this here?'.

        If `region` or `gender` is omitted, falls back to the authenticated user's saved values. Region falls back to user.location-derived cluster lookup (TODO: geo-IP); for now, supply explicitly.
      summary: Preview the starter pack for a (region, gender) combination
      parameters:
      - in: query
        name: gender
        schema:
          enum:
          - men
          - women
          - boys
          - girls
          - kid_boys
          - kid_girls
          type: string
          minLength: 1
        description: |-
          * `men` - Men
          * `women` - Women
          * `boys` - Boys
          * `girls` - Girls
          * `kid_boys` - Kid boys
          * `kid_girls` - Kid girls
      - in: query
        name: region
        schema:
          type: string
          minLength: 1
        description: RegionCluster.code
      tags:
      - wardrobe
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StarterPackPreview'
          description: ''
  /api/wardrobe/starter-pack/regions/:
    get:
      operationId: wardrobe_starter_pack_regions_retrieve
      description: |-
        Returns the catalogue of region buckets the starter-pack system supports (Phase 1: 3 regions). Clients should call this on first run instead of hardcoding the list — new regions added server-side become available without a client update.

        Includes `suggested_region`, the server's best guess for the current user based on their timezone, so clients can pre-select.
      summary: List all available region clusters
      tags:
      - wardrobe
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegionListResponse'
          description: ''

        schema:
          type: string
        description: Location name (geocoded)
      - in: query
        name: lon
        schema:
          type: number
          format: float
        description: Longitude
      tags:
      - weather
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeatherSnapshot'
          description: ''
components:
  schemas:
    ActionEnum:
      enum:
      - wear_again
      - carry_on_only
      - weight_saved
      - rental
      - secondhand
      type: string
      description: |-
        * `wear_again` - Re-wore an item
        * `carry_on_only` - Switched to carry-on
        * `weight_saved` - Reduced luggage weight
        * `rental` - Chose rental over purchase
        * `secondhand` - Bought secondhand
    AlreadyApplied:
      type: object
      properties:
        error:
          type: string
        application_id:
          type: integer
      required:
      - application_id
      - error
    AnalyzeImageResponse:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        formality:
          type: string
        season:
          type: string
        colors:
          type: array
          items:
            type: string
        material:
          type: string
        brand:
          type: string
      required:
      - brand
      - category
      - colors
      - formality
      - material
      - name
      - season
    AppleSyncResult:
      type: object
      properties:
        created:
          type: integer
        updated:
          type: integer
        errors:
          type: array
          items:
            type: string
      required:
      - created
      - errors
      - updated
    BagTypeEnum:
      enum:
      - personal_item
      - backpack
      - carry_on
      - checked
      type: string
      description: |-
        * `personal_item` - personal_item
        * `backpack` - backpack
        * `carry_on` - carry_on
        * `checked` - checked
    BlankEnum:
      enum:
      - ''
    BulkUploadResponse:
      type: object
      properties:
        created:
          type: integer
        errors:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - created
      - errors
    CalendarEvent:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 500
        description:
          type: string
        location:
          type: string
          maxLength: 500
        event_type:
          $ref: '#/components/schemas/EventTypeEnum'
        formality:
          type: string
          maxLength: 20
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        all_day:
          type: boolean
        source:
          $ref: '#/components/schemas/CalendarEventSourceEnum'
        external_id:
          type: string
          maxLength: 500
        raw_data: {}
        created_at:
          type: string
          format: date-time
          readOnly: true
        user:
          type: integer
          readOnly: true
      required:
      - created_at
      - end_time
      - id
      - start_time
      - title
      - user
    CalendarEventRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
        description:
          type: string
        location:
          type: string
          maxLength: 500
        event_type:
          $ref: '#/components/schemas/EventTypeEnum'
        formality:
          type: string
          maxLength: 20
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        all_day:
          type: boolean
        source:
          $ref: '#/components/schemas/CalendarEventSourceEnum'
        external_id:
          type: string
          maxLength: 500
        raw_data: {}
      required:
      - end_time
      - start_time
      - title

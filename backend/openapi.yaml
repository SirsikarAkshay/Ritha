      - name
    ClothingItemSourceEnum:
      enum:
      - manual
      - starter_pack
      - image_scan
      - receipt
      type: string
      description: |-
        * `manual` - Added manually
        * `starter_pack` - Auto-added from starter pack
        * `image_scan` - Detected from photo
        * `receipt` - Imported from receipt
    ConfidenceEnum:
      enum:
      - high
      - medium
      - low
      type: string
      description: |-
        * `high` - High
        * `medium` - Medium
        * `low` - Low
    ConflictDetectorInputRequest:
      type: object
      description: Input for POST /api/agents/conflict-detector/
      properties:
        lat:
          type: number
          format: double
          description: Latitude for live weather
        lon:
          type: number
          format: double
          description: Longitude for live weather
        location:
          type: string
          description: Location name (geocoded)
        weather:
          type: object
          additionalProperties: {}
          description: Weather snapshot dict (overrides live fetch)
        date:
          type: string
          format: date
          description: Date to check (YYYY-MM-DD, defaults to today)
    ConflictDetectorResponse:
      type: object
      properties:
        job_id:
          type: integer
        status:
          type: string
        output:
          type: object
          additionalProperties: {}
      required:
      - job_id
      - output
      - status
    Conversation:
      type: object
      properties:
        id:

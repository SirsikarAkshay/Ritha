components:
  schemas:
    ActionEnum:
      enum:
      - wear_again
      - carry_on_only
      - weight_saved
      - rental
      - secondhand
      type: string
      description: |-
        * `wear_again` - Re-wore an item
        * `carry_on_only` - Switched to carry-on
        * `weight_saved` - Reduced luggage weight
        * `rental` - Chose rental over purchase
        * `secondhand` - Bought secondhand
    AppleSyncResult:
      type: object
      properties:
        created:
          type: integer
        updated:
          type: integer
        errors:
          type: array
          items:
            type: string
      required:
      - created
      - errors
      - updated
    BgRemovalResponse:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        original_filename:
          type: string
      required:
      - message
      - original_filename
      - status
    BulkUploadResponse:
      type: object
      properties:
        created:
          type: integer
        errors:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - created
      - errors
    CalendarEvent:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 500
        description:
          type: string
        location:
          type: string
          maxLength: 500
        event_type:
          $ref: '#/components/schemas/EventTypeEnum'
        formality:
          type: string
          maxLength: 20
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        all_day:
          type: boolean
        source:
          $ref: '#/components/schemas/CalendarEventSourceEnum'
        external_id:
          type: string
          maxLength: 500
        raw_data: {}
        created_at:
          type: string
          format: date-time
          readOnly: true
        user:
          type: integer
          readOnly: true
      required:
      - created_at
      - end_time
      - id
      - start_time
      - title
      - user
    CalendarEventRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
        description:
          type: string
        location:
          type: string
          maxLength: 500
        event_type:
          $ref: '#/components/schemas/EventTypeEnum'
        formality:
          type: string
          maxLength: 20
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        all_day:
          type: boolean
        source:
          $ref: '#/components/schemas/CalendarEventSourceEnum'
        external_id:
          type: string
          maxLength: 500
        raw_data: {}
      required:
      - end_time
      - start_time
      - title
    CalendarEventSourceEnum:
      enum:
      - google
      - outlook
      - manual
      type: string
      description: |-
        * `google` - Google Calendar
        * `outlook` - Outlook
        * `manual` - Manual Entry
    CategoryEnum:
      enum:
      - top
      - bottom
      - dress
      - outerwear
      - footwear
      - accessory
      - activewear
      - formal
      - other
      type: string
      description: |-
        * `top` - Top
        * `bottom` - Bottom
        * `dress` - Dress
        * `outerwear` - Outerwear
        * `footwear` - Footwear
        * `accessory` - Accessory
        * `activewear` - Activewear
        * `formal` - Formal
        * `other` - Other
    ClothingItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        category:
          $ref: '#/components/schemas/CategoryEnum'
        formality:
          $ref: '#/components/schemas/FormalityEnum'
        season:
          $ref: '#/components/schemas/SeasonEnum'
        colors: {}
        material:
          type: string
          maxLength: 100
        weight_grams:
          type: integer

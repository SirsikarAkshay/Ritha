        times_worn:
          type: integer
          readOnly: true
        last_worn:
          type: string
          format: date
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        user:
          type: integer
          readOnly: true
      required:
      - category
      - created_at
      - id
      - last_worn
      - name
      - times_worn
      - updated_at
      - user
    ClothingItemRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        category:
          $ref: '#/components/schemas/CategoryEnum'
        source:
          $ref: '#/components/schemas/ClothingItemSourceEnum'
        formality:
          $ref: '#/components/schemas/FormalityE29Enum'
        season:
          $ref: '#/components/schemas/SeasonEnum'
        colors: {}
        material:
          type: string
          maxLength: 100
        weight_grams:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
        brand:
          type: string
          maxLength: 100
        image:
          type: string
          format: binary
          nullable: true
        image_clean:
          type: string
          format: binary
          nullable: true
        tags: {}
        is_active:
          type: boolean
      required:

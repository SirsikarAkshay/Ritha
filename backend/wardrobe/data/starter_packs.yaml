# ─────────────────────────────────────────────────────────────────────────────
# Ritha — Starter Pack Catalog (Phase 1)
#
# Methodology
#   Each item is included iff one of:
#     a) prevalence ≥ 60% in (gender, region) per a cited survey
#     b) prevalence ≥ 40% AND it's an outfit anchor (high combinatorial value)
#     c) prevalence ≥ 30% AND climate-mandatory
#   Religion-specific items are NEVER default — surfaced via opt_in toggles.
#
# Sources used in Phase 1
#   - cotton_inc_2023:  Cotton Incorporated Lifestyle Monitor Survey 2023 (US adults)
#   - cotton_inc_teen_2022: Cotton Inc Tween/Teen Lifestyle Monitor 2022 (US 13-17)
#   - nss_r75:          National Sample Survey Round 75 (India, 2017-18) urban consumption
#   - eurostat_hbs:     Eurostat Household Budget Survey 2020 (COICOP 03.1, EU-27)
#   - yougov_uk_2023:   YouGov UK apparel ownership tracker 2023
#   - yougov_india_2023:YouGov India apparel ownership tracker 2023
#   - statista_gcs_2024:Statista Global Consumer Survey 2024 (per-country apparel ownership)
#   - euromonitor_kids: Euromonitor Childrenswear Q3 2023 (10 markets)
#   - editorial:        No survey data — based on garment-category fundamentals.
#                       Confidence:'low'. Targets: nightwear, underwear, basic socks.
#
# Image placeholders
#   Unsplash Source URLs (`https://source.unsplash.com/400x400/?<keywords>`) for
#   Phase 1. Each request returns a different photo matching keywords.
#   Phase 2: replace with curated/licensed images via admin or seed re-import.
# ─────────────────────────────────────────────────────────────────────────────

regions:
  - code: na_temperate
    display_name: "North America (Temperate)"
    climate_zone: C            # Köppen: Cfa/Cfb/Csa/Csb/Dfa
    cultural_cluster: north_american
    country_codes: ["US","CA-South"]
    notes: "Mixed temperate to humid-continental. Distinct four seasons in most metros."

  - code: nw_temperate
    display_name: "Northwest Europe (Temperate)"
    climate_zone: C            # Köppen: Cfb dominant
    cultural_cluster: nw_european
    country_codes: ["UK","IE","NL","BE","DE","DK","FR-North","CH","AT-North"]
    notes: "Cool/wet maritime climate. Layering is structural to wardrobe composition."

  - code: south_asian_tropical
    display_name: "South India (Tropical)"
    climate_zone: A            # Köppen: Aw/Am
    cultural_cluster: south_asian
    country_codes: ["IN-South","IN-Coast","BD","SL","PK-South"]
    notes: "Tropical/monsoon south (Chennai, Bengaluru, Kochi, coastal). High humidity year-round, no real winter — light cottons, sandals, breathable weaves. Traditional/Western coexist."

  - code: south_asian_north
    display_name: "North India & Plains (Subtropical)"
    climate_zone: C            # Köppen: Cwa — hot summers, genuinely cold winters
    cultural_cluster: south_asian
    country_codes: ["IN-North","IN-Central","IN-Punjab","PK-North","NP"]
    notes: "Subtropical monsoon plains (Delhi, Punjab, UP, Lucknow). Hot summers but real winters at 5–12°C — winter layering (sweaters, shawls, woollen coats, jackets) is structural, unlike the tropical south. Salwar-kameez, kurta-pyjama and Nehru jackets are everyday wear."

  - code: mena_arid
    display_name: "Middle East & North Africa (Arid)"
    climate_zone: B            # Köppen: BWh/BSh
    cultural_cluster: mena
    country_codes: ["SA","AE","EG","MA","TN","JO","QA","KW","BH","OM","LB-Coast","DZ"]
    notes: "Arid hot, mild winters. Aircon-heavy interiors. Modest/religious dress is opt-in, not default — defaults work for secular professional wear in Dubai/Casablanca/Beirut."

  - code: east_asian_subtropical
    display_name: "East & Southeast Asia (Subtropical)"
    climate_zone: A            # Köppen: Af/Aw/Cwa
    cultural_cluster: east_asian
    country_codes: ["TH","VN","PH","MY","SG","ID","HK","KH","LA","BR-Brunei"]
    notes: "Hot/humid year-round. Aircon-heavy interiors mean light layers more common than expected. Western daily wear universal in metros."

  - code: latam_tropical
    display_name: "Latin America (Tropical)"
    climate_zone: A            # Köppen: Aw/Am/As
    cultural_cluster: latin_american
    country_codes: ["BR","MX-Coast","CO","VE","CR","PA","DO","CU","HN","NI","SV","GT-Coast"]
    notes: "Tropical/sub-tropical. Western daily wear universal in metros. Vibrant accent colors common per IBGE POF apparel preference data."


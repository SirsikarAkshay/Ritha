services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${DB_NAME:-ritha}
      POSTGRES_USER:     ${DB_USER:-ritha}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ritha_dev_pw}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ritha}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (cache + channel layer + Celery broker) ───────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Migrations (run-once init container) ────────────────────────────────────
  migrations:
    build:
      context: .
      target: production
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: ritha.settings_production
      DB_SSLMODE: ${DB_SSLMODE:-disable}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/app/entrypoint.sh"]
    command: ["echo", "Migrations complete."]

  # ── API (Daphne ASGI — HTTP + WebSocket) ────────────────────────────────────
  api:
    build:
      context: .
      target: production
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: ritha.settings_production
      DB_SSLMODE: ${DB_SSLMODE:-disable}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    entrypoint: []
    command: >
      daphne ritha.asgi:application
        -b 0.0.0.0
        -p 8000
        --proxy-headers
        --access-log -
        -v 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      target: production
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: ritha.settings_production
      DB_SSLMODE: ${DB_SSLMODE:-disable}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    entrypoint: []
    command: celery -A ritha worker --loglevel=info --concurrency=4
    healthcheck:
      test: ["CMD-SHELL", "celery -A ritha inspect ping --timeout 10 || exit 1"]
      interval: 60s
      timeout: 15s
      start_period: 30s
      retries: 3

  # ── Celery Beat (scheduled tasks) ───────────────────────────────────────────
  beat:
    build:
      context: .
      target: production
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: ritha.settings_production
      DB_SSLMODE: ${DB_SSLMODE:-disable}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    entrypoint: []
    command: celery -A ritha beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ── Web (Vite/React SPA, served by its own nginx) ──────────────────────────
  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.ritha.com/api}
        VITE_WS_BASE_URL:  ${VITE_WS_BASE_URL:-wss://api.ritha.com}
        VITE_APP_VERSION:  ${VITE_APP_VERSION:-1.0.0}
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Nginx (edge reverse proxy, TLS termination) ────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy

  # ── Certbot (optional — TLS certificate renewal) ────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h; done"
    profiles:
      - tls

volumes:
  postgres_data:
  redis_data:
  media_files:
  static_files:
  certbot_certs:
  certbot_www:

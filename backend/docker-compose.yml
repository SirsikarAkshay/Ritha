version: "3.9"

services:

  # ── Backend API ──────────────────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: arokah.settings_production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - media_files:/app/media
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_cultural_data &&
             gunicorn arokah.wsgi:application
               --bind 0.0.0.0:8000
               --workers 4
               --timeout 120
               --access-logfile -"

  # ── Celery worker (processes async agent tasks) ──────────────────────────────
  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: arokah.settings_production
    depends_on:
      - redis
      - db
    command: celery -A arokah worker --loglevel=info --concurrency=4

  # ── Celery Beat (scheduled tasks — daily looks at 06:00 UTC) ─────────────────
  beat:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: arokah.settings_production
    depends_on:
      - redis
      - db
      - worker
    command: celery -A arokah beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${DB_NAME:-arokah}
      POSTGRES_USER:     ${DB_USER:-arokah}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-arokah_dev_pw}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-arokah}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (throttle + cache) ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

volumes:
  postgres_data:
  redis_data:
  media_files:

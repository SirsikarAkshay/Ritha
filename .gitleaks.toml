# gitleaks configuration for Ritha.
#
# Extends the default gitleaks ruleset and allowlists Firebase *client* config
# values, which are public by design: the `AIza…` API keys and the web-push
# VAPID *public* key are identifiers shipped inside every copy of the mobile/web
# app. They are NOT credentials — access is controlled by Firebase Security
# Rules and GCP API-key restrictions, not by keeping these strings private.
# (Real secrets — service-account JSON, a private VAPID key — are not here and
# remain fully scanned.)
#
# Refs:
#   https://firebase.google.com/docs/projects/api-keys
#   https://developer.mozilla.org/docs/Web/API/Push_API  (VAPID: public vs private)
#
# Scope is deliberately narrow: only the generated Firebase config files (which
# contain nothing but public identifiers) are ignored by path, plus the exact
# public key values by regex. A genuinely new secret elsewhere still fails CI.

title = "Ritha gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Public Firebase client config (identifiers, not secrets)"

# Generated Firebase config files — public client identifiers only.
paths = [
  '''mobile_flutter/web/firebase-messaging-sw\.js''',
  '''mobile_flutter/lib/firebase_options\.dart''',
  '''mobile_flutter/android/app/google-services\.json''',
  '''mobile_flutter/ios/Runner/GoogleService-Info\.plist''',
]

# Exact public key values (also covers occurrences outside the config files,
# e.g. the web-push VAPID public key hard-coded in push_notification_service.dart).
regexes = [
  '''AIzaSyB9687qyfz4Vycqhxm7ZttqkYFmLb-en6Y''',
  '''AIzaSyBdcrgR4sboxvOp1skab1OAbNIhq3LC7k8''',
  '''AIzaSyDlkckW11b3Ks2Lw92sN_uLSCyeueZaH0o''',
  '''BOVW5On13xvLTVhNiN1eciAX77ipfinAQqMZJWwUT3mHv6pzOTbumJGuw-J_wvhU7ZVbq96Cdxcas2VZgcmv4bo''',
]

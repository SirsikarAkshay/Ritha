name: ritha_mobile
description: "Ritha — collaborative packing & AI travel styling. Pack group trips together and get outfit picks from your wardrobe, weather and destination."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  flutter_secure_storage: ^10.3.1
  provider: ^6.1.2
  go_router: ^17.3.0
  web_socket_channel: ^3.0.1
  image_picker: ^1.2.3
  intl: ^0.20.3
  url_launcher: ^6.3.1
  device_calendar: ^4.3.3
  permission_handler: ^12.0.3
  firebase_core: ^4.12.1
  firebase_messaging: ^16.4.1
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run for the same ref/PR if a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION:   "20"

jobs:

  # ─── Backend: lint + pytest + migration/schema drift ──────────────────────
  backend:
    name: Backend (ruff + pytest + drift checks)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      # requirements-ci.txt is the lean set: everything except the heavy ML
      # training stack (torch/torchvision/scikit-learn), which no test imports.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Check for missing migrations
        env:
          DJANGO_SETTINGS_MODULE: ritha.settings
        run: python manage.py makemigrations --check --dry-run

      - name: Verify OpenAPI schema is up-to-date
        env:
          DJANGO_SETTINGS_MODULE: ritha.settings
        run: |
          python manage.py spectacular --file /tmp/openapi.regenerated.yaml
          if ! diff -q openapi.yaml /tmp/openapi.regenerated.yaml > /dev/null; then
            echo "::error::openapi.yaml is out of date. Run 'make codegen' and commit the result."
            diff -u openapi.yaml /tmp/openapi.regenerated.yaml | head -200 || true
            exit 1
          fi

      - name: Run pytest
        env:
          DJANGO_SETTINGS_MODULE: ritha.settings
        run: pytest tests/ --cov=. --cov-report=term-missing --cov-report=xml

  # ─── Web frontend: typecheck + client drift + production build ────────────
  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check against OpenAPI schema
        run: npm run check:api

      - name: Verify generated TS client matches OpenAPI schema
        run: |
          npm run gen:api
          if ! git diff --quiet src/api/generated/; then
            echo "::error::frontend/src/api/generated/ is out of date. Run 'make codegen' and commit the result."
            git --no-pager diff src/api/generated/ | head -200
            exit 1
          fi

      - name: Production build
        run: npm run build:production

  # ─── Web frontend: Playwright E2E (self-mocked, no backend needed) ────────
  e2e:
    name: Web E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Cache the Playwright browser binaries, keyed on the lockfile (which
      # pins @playwright/test). Falls through to a full download on a miss.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      # The config's webServer auto-starts `npm run dev` on :5175; every API
      # call is intercepted via page.route, so no backend/DB/auth is required.
      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ─── Mobile (Flutter): format + static analysis + tests ───────────────────
  mobile:
    name: Mobile (flutter format + analyze + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mobile_flutter

    steps:
      - uses: actions/checkout@v4

      # Track latest stable: pubspec requires Dart ^3.11.0, which only recent
      # stable Flutter releases ship. (The previous 3.24.0 pin shipped Dart 3.5
      # and failed `flutter pub get` resolution.) Pin an explicit version here
      # once a Dart ≥3.11 stable tag is confirmed, for reproducibility.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Static analysis
        run: flutter analyze --no-fatal-infos

      - name: Run unit tests
        run: flutter test

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run for the same ref/PR if a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION:   "20"
  FLUTTER_VERSION: "3.24.0"

jobs:

  # ─── Backend: pytest + migration drift + schema drift ─────────────────────
  backend:
    name: Backend (pytest + drift checks)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check for missing migrations
        env:
          DJANGO_SETTINGS_MODULE: ritha.settings
        run: python manage.py makemigrations --check --dry-run

      - name: Verify OpenAPI schema is up-to-date
        env:
          DJANGO_SETTINGS_MODULE: ritha.settings
        run: |
          python manage.py spectacular --file /tmp/openapi.regenerated.yaml
          if ! diff -q openapi.yaml /tmp/openapi.regenerated.yaml > /dev/null; then
            echo "::error::openapi.yaml is out of date. Run 'make codegen' and commit the result."
            diff -u openapi.yaml /tmp/openapi.regenerated.yaml | head -200 || true
            exit 1
          fi

      - name: Run pytest
        env:
          DJANGO_SETTINGS_MODULE: ritha.settings
        run: pytest tests/ -v --tb=short

  # ─── Web frontend: typecheck + production build ───────────────────────────
  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check against OpenAPI schema
        run: npm run check:api

      - name: Verify generated TS client matches OpenAPI schema
        run: |
          npm run gen:api
          if ! git diff --quiet src/api/generated/; then
            echo "::error::frontend/src/api/generated/ is out of date. Run 'make codegen' and commit the result."
            git --no-pager diff src/api/generated/ | head -200
            exit 1
          fi

      - name: Production build
        run: npm run build:production

  # ─── Mobile (Flutter): static analysis + tests ────────────────────────────
  mobile:
    name: Mobile (flutter analyze + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_flutter

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze --no-fatal-infos

      - name: Run unit tests
        run: flutter test
